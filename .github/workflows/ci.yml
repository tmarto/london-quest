name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.29.0'

jobs:
  # ── Job 1: Static analysis + unit tests ──────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold (60%)
        run: |
          python3 - << 'EOF'
          import re, sys
          with open('coverage/lcov.info') as f:
              content = f.read()
          counts = re.findall(r'^DA:\d+,(\d+)', content, re.MULTILINE)
          total = len(counts)
          covered = sum(1 for x in counts if x != '0')
          if total == 0:
              print('ERROR: No coverage data found in lcov.info')
              sys.exit(1)
          cov = covered / total * 100
          print(f'Coverage: {cov:.1f}% ({covered}/{total} lines)')
          if cov < 60:
              print(f'FAIL: Coverage {cov:.1f}% is below 60% threshold')
              sys.exit(1)
          print('Coverage threshold passed.')
          EOF

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 14

  # ── Job 2: Integration tests (E2E on Android emulator) ───────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable KVM (faster emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_2
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: flutter test integration_test --timeout 120s

  # ── Job 3: Build Android APK ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: [ lint-and-test, integration-test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (obfuscated)
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME:-$GITHUB_SHA}
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/london-quest-${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: london-quest-android-${{ github.sha }}
          path: build/app/outputs/flutter-apk/london-quest-*.apk
          retention-days: 30

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-symbols-${{ github.sha }}
          path: build/debug-info/
          retention-days: 90

  # ── Job 4: Build iOS IPA ──────────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    needs: [ lint-and-test, integration-test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          VERSION=${GITHUB_REF_NAME:-$GITHUB_SHA}
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r london-quest-${VERSION}.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: london-quest-ios-${{ github.sha }}
          path: build/ios/iphoneos/london-quest-*.ipa
          retention-days: 30

  # ── Job 5: Publish GitHub Release (tags only) ─────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [ build-android, build-ios ]

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: london-quest-android-${{ github.sha }}
          path: release-assets/

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: london-quest-ios-${{ github.sha }}
          path: release-assets/

      - name: List assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
