name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold (60%)
        run: |
          pip install lcov-cobertura --quiet
          sudo apt-get install -y lcov --quiet
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oP '\d+\.\d+(?=%)' | head -1)
          echo "Line coverage: ${COVERAGE}%"
          python3 -c "
          cov = float('${COVERAGE}')
          print(f'Coverage: {cov:.1f}%')
          assert cov >= 60, f'Coverage {cov:.1f}% is below 60% threshold'
          print('Coverage threshold passed.')
          "

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 14

      - name: Build APK
        if: success()
        run: flutter build apk --release

      - name: Rename APK
        if: success()
        run: |
          VERSION=${GITHUB_REF_NAME:-$GITHUB_SHA}
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/london-quest-${VERSION}.apk

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: london-quest-${{ github.sha }}
          path: build/app/outputs/flutter-apk/london-quest-*.apk
          retention-days: 30

      - name: Attach APK to release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/london-quest-*.apk
