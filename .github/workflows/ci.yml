name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold (60%)
        run: |
          python3 - << 'EOF'
          import re, sys
          with open('coverage/lcov.info') as f:
              content = f.read()
          counts = re.findall(r'^DA:\d+,(\d+)', content, re.MULTILINE)
          total = len(counts)
          covered = sum(1 for x in counts if x != '0')
          if total == 0:
              print('ERROR: No coverage data found in lcov.info')
              sys.exit(1)
          cov = covered / total * 100
          print(f'Coverage: {cov:.1f}% ({covered}/{total} lines)')
          if cov < 60:
              print(f'FAIL: Coverage {cov:.1f}% is below 60% threshold')
              sys.exit(1)
          print('Coverage threshold passed.')
          EOF

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 14

      - name: Build APK
        if: success()
        run: flutter build apk --release

      - name: Rename APK
        if: success()
        run: |
          VERSION=${GITHUB_REF_NAME:-$GITHUB_SHA}
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/london-quest-${VERSION}.apk

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: london-quest-${{ github.sha }}
          path: build/app/outputs/flutter-apk/london-quest-*.apk
          retention-days: 30

      - name: Attach APK to release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/london-quest-*.apk
