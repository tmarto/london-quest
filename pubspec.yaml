name: london_quest
description: London Quiz App para a família Marto - viagem 2026
version: 1.0.5+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  firebase_core: ">=3.6.0 <5.0.0"
  firebase_crashlytics: ">=4.1.3 <6.0.0"
  package_info_plus: ">=8.0.0 <11.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ">=3.0.0 <7.0.0"
  flutter_launcher_icons: ">=0.13.1 <0.15.0"

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
