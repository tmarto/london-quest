workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Run tests
        script: flutter test

      - name: Build iOS (unsigned)
        script: |
          flutter build ios --release --no-codesign

      - name: Package IPA
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r london-quest.ipa Payload
          rm -rf Payload

    artifacts:
      - build/ios/iphoneos/london-quest.ipa

    publishing:
      email:
        recipients:
          - tmarto@users.noreply.github.com
        notify:
          success: true
          failure: true
